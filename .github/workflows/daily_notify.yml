name: Daily Calendar Notification

on:
  schedule:
    - cron: "30 12 * * 1-5"  # 09:30 AM ART (UTC-3), lunes a viernes
  workflow_dispatch:
    inputs:
      force_payment_check:
        description: "Forzar chequeo de pagos (true/false)"
        required: false
        default: "false"

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Run notifier
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_PAYMENT_CHECK: ${{ github.event.inputs.force_payment_check }}
        run: uv run calendar_notifier.py
